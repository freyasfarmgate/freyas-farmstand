<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div style="font-size:2.5rem;margin-bottom:0.5rem;">🌿</div>
    <h1>Freya's Farmstand</h1>
    <p>Admin Login</p>
    <input type="password" class="login-field" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <p class="login-error" id="login-error">Incorrect password. Try again.</p>
  </div>
</div>
